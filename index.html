<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teaching Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #37352f;
      min-height: 100dvh;
      padding: 48px 24px 64px;
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #787774;
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e9e9e7;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    a.card:hover {
      background: #f7f7f5;
      border-color: #d3d1cb;
    }
    .cover {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      border-bottom: 1px solid #e9e9e7;
    }
    .cover.directed { background: #f1f5f9; color: #1a6fb5; }
    .cover.expansion { background: #f5f5f4; color: #44403c; }
    .meta {
      padding: 14px 16px 16px;
    }
    .meta h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .meta p {
      font-size: 0.85rem;
      color: #787774;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Teaching Tools</h1>
    <p class="subtitle">Interactive maths tools for the classroom.</p>
    <div class="gallery">
      <a class="card" href="Directed_Numbers/directed-numbers-tool.html">
        <div class="cover directed">−3 ··· 0 ··· +3</div>
        <div class="meta">
          <h2>Directed Numbers</h2>
          <p>Number line tool for exploring positive and negative numbers.</p>
        </div>
      </a>
      <a class="card" href="Expansion/dist/index.html">
        <div class="cover expansion">(a + b)(c + d)</div>
        <div class="meta">
          <h2>Lunch Box Expansion</h2>
          <p>Visual algebra expansion with lunch boxes and sandwiches.</p>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
