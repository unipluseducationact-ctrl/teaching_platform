<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identities Area Model — Expand &amp; Factorize</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfbf7; --panel: #ffffff; --panel2: #f5efe6; --ink: #2c2420; --dim: #5d544f;
      --a: #0277BD; --b: #9A7209; --ab: #2E7D32;
      --a-fill: #4FC3F7; --b-fill: #FFD54F; --ab-fill: #81C784;
      --line: rgba(0, 0, 0, 0.08);
      --bad: #C62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; background: var(--bg); color: var(--ink);
      font-family: "Hanken Grotesk", system-ui, sans-serif;
    }
    header {
      padding: 16px 28px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    header h1 { font-size: 22px; margin: 0; font-weight: 700; }
    header .crumb { color: var(--dim); font-size: 13px; }
    .back {
      display: inline-flex; align-items: center; gap: 4px; padding: 7px 12px;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
      color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 600;
    }
    .back:hover { border-color: var(--a); color: var(--a); }
    main { padding: 18px 28px 48px; max-width: 1080px; margin: 0 auto; }

    .controls { display: flex; flex-wrap: wrap; gap: 16px 24px; align-items: center; margin-bottom: 18px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--panel); border: 1px solid var(--line); color: var(--ink);
      font: inherit; font-weight: 600; padding: 9px 15px; border-radius: 999px; cursor: pointer;
      font-size: 16px; transition: all .15s; line-height: 1.3;
    }
    .chip .katex { font-size: 1.05em; }
    .chip:hover { color: var(--a); border-color: rgba(2, 119, 189, 0.35); }
    .chip.active { color: #06283d; background: var(--a-fill); border-color: var(--a-fill); }
    .mode-toggle { display: inline-flex; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    .mode-btn { background: none; border: 0; color: var(--dim); font: inherit; font-weight: 700; padding: 9px 18px; cursor: pointer; }
    .mode-btn.active { background: var(--ab-fill); color: #06283d; }

    .lab-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(220px, 300px); gap: 20px; align-items: start; }
    @media (max-width: 820px) { .lab-layout { grid-template-columns: 1fr; } }

    .board { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; }
    .prompt { text-align: center; margin-bottom: 4px; }
    .prompt .lead { font-size: 15px; color: var(--dim); font-weight: 600; }
    .prompt .expr { font-size: 30px; margin-top: 4px; color: var(--ink); }
    .prompt .expr .katex { font-size: 1.15em; }
    .note { text-align: center; font-size: 14px; color: var(--dim); margin: 10px 0 18px; line-height: 1.5; }

    .area-wrap { margin: 0 auto; overflow-x: auto; padding-bottom: 4px; }
    .area-row { display: flex; align-items: flex-start; justify-content: center; gap: 8px; min-width: min-content; padding: 4px 2px; }
    .term-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .term-label { min-height: 22px; font-size: 15px; color: var(--dim); white-space: nowrap; }
    .plus { min-height: 76px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: var(--dim); }
    .cell {
      width: 104px; min-height: 76px; border: 2px dashed rgba(0,0,0,.22); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; position: relative;
      background: #fff; transition: border-color .15s, background .15s;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
    }
    .cell.drag-over { border-color: var(--a); background: rgba(79,195,247,.12); }
    .cell.filled { border-style: solid; }
    .cell.correct { border-color: var(--ab); box-shadow: 0 0 0 1px var(--ab) inset; background: rgba(129,199,132,.14); }
    .cell.wrong { border-color: var(--bad); box-shadow: 0 0 0 1px var(--bad) inset; background: rgba(198,40,40,.08); }
    .cell.slot-targetable { border-color: var(--a); background: rgba(79,195,247,.08); }
    .cell-val { font-size: 22px; font-weight: 700; }
    .cell-clear {
      position: absolute; top: 3px; right: 5px; background: none; border: none; color: var(--dim);
      font-size: 16px; cursor: pointer; line-height: 1; padding: 2px 4px;
    }
    .cell-clear:hover { color: var(--ink); }
    .cell-placeholder { color: rgba(0,0,0,.25); font-size: 24px; font-weight: 700; }

    .verdict { text-align: center; min-height: 26px; margin-top: 14px; font-size: 16px; font-weight: 700; }
    .verdict.ok { color: var(--ab); }
    .verdict.bad { color: var(--bad); }
    .verdict.neutral { color: var(--dim); font-weight: 600; font-size: 14px; }

    .reveal {
      margin: 6px 0 22px; background: #fff; border: 1px solid var(--line);
      border-left: 5px solid var(--ab); border-radius: 12px; padding: 16px 20px 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    .reveal .eq-label { text-align: center; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--ab); font-weight: 700; margin-bottom: 14px; }
    .steps-grid { display: grid; grid-template-columns: auto auto; column-gap: 10px; row-gap: 8px; justify-content: center; align-items: baseline; overflow-x: auto; }
    .step-lhs { text-align: right; font-size: 22px; color: var(--ink); }
    .step-rhs { text-align: left; font-size: 22px; color: var(--ink); padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
    .step-lhs .katex, .step-rhs .katex { font-size: 1.04em; }
    .step-rhs.is-new { background: rgba(129,199,132,.24); box-shadow: 0 0 0 1px rgba(46,125,50,.25) inset; animation: stepIn .25s ease; }
    @keyframes stepIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .steps-hint { text-align: center; color: var(--dim); font-size: 14px; padding: 6px 0; }
    .reveal-nav { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

    .btn {
      background: var(--panel); border: 1px solid var(--line); color: var(--ink); font: inherit;
      font-weight: 600; padding: 10px 20px; border-radius: 9px; cursor: pointer; font-size: 14px;
    }
    .btn:hover { border-color: var(--a); }
    .btn.primary { background: var(--ab-fill); color: #06283d; border-color: var(--ab-fill); }
    .board-nav { display: flex; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    .tile-bank { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
    .tile-bank h4 { margin: 0 0 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink); font-weight: 700; }
    .bank-hint { font-size: 12px; color: var(--dim); margin: 0 0 12px; line-height: 1.45; }
    .tiles { display: flex; flex-wrap: wrap; gap: 10px; }
    .tile {
      display: inline-flex; align-items: center; justify-content: center; min-width: 52px; height: 46px;
      padding: 0 12px; border-radius: 10px; font-weight: 700; font-size: 18px;
      cursor: grab; user-select: none; border: 1px solid var(--line); background: #fff;
    }
    .tile:active { cursor: grabbing; opacity: .85; }
    .tile.selected { outline: 3px solid rgba(2,119,189,.35); outline-offset: 1px; }
    .tile.a  { background: rgba(79,195,247,.22); color: var(--a); border-color: rgba(2,119,189,.4); }
    .tile.b  { background: rgba(255,213,79,.28); color: var(--b); border-color: rgba(154,114,9,.4); }
    .tile.ab { background: rgba(129,199,132,.28); color: var(--ab); border-color: rgba(46,125,50,.4); }
    .cell.a  .cell-val { color: var(--a); }
    .cell.b  .cell-val { color: var(--b); }
    .cell.ab .cell-val { color: var(--ab); }

    .legend { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
    .legend-title { margin: 0 0 10px; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink); font-weight: 700; }
    .lg-item { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; color: var(--dim); }
    .lg-sw { width: 16px; height: 16px; border-radius: 4px; flex: none; border: 1px solid var(--line); }

    @media (max-width: 520px) {
      main { padding: 16px 16px 40px; }
      header { padding: 14px 16px; }
      .prompt .expr { font-size: 25px; }
      .reveal .eq-line { font-size: 18px; }
      .cell { min-height: 64px; }
      .tile { min-width: 46px; height: 42px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="../levels/pre-s3.html">← Platform</a>
    <h1>Identities · Area Model</h1>
    <span class="crumb">Perfect squares &amp; difference of two squares · expand and factorize</span>
  </header>

  <main>
    <div class="controls">
      <div class="chip-row" id="identity-chips"></div>
      <div class="mode-toggle" role="group" aria-label="Direction">
        <button class="mode-btn active" data-mode="expand" type="button">Expand</button>
        <button class="mode-btn" data-mode="factorize" type="button">Factorize</button>
      </div>
    </div>

    <div class="lab-layout">
      <div class="board">
        <div class="prompt">
          <div class="lead" id="prompt-lead"></div>
          <div class="expr" id="prompt-expr"></div>
        </div>

        <div class="reveal" id="reveal">
          <div class="eq-label" id="reveal-label"></div>
          <div class="steps-grid" id="reveal-lines"></div>
          <div class="steps-hint" id="reveal-hint"></div>
          <div class="reveal-nav">
            <button class="btn primary" id="combine-btn" type="button"></button>
          </div>
        </div>

        <p class="note" id="board-note"></p>

        <div class="area-wrap">
          <div class="area-row" id="area-row"></div>
        </div>

        <div class="verdict neutral" id="verdict"></div>

        <div class="board-nav">
          <button class="btn" id="reset-btn" type="button">Clear board</button>
        </div>
      </div>

      <aside class="tile-bank">
        <h4>Area tiles</h4>
        <p class="bank-hint" id="bank-hint"></p>
        <div class="tiles" id="tiles"></div>
        <div class="legend">
          <p class="legend-title">Colour key</p>
          <div class="lg-item"><span class="lg-sw" style="background:var(--a-fill)"></span> a² — square of a</div>
          <div class="lg-item"><span class="lg-sw" style="background:var(--ab-fill)"></span> ab — rectangle / middle term</div>
          <div class="lg-item"><span class="lg-sw" style="background:var(--b-fill)"></span> b² — square of b</div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      var IDENTITIES = {
        "sq-sum": {
          chip: "(a+b)^2", factored: "(a+b)^2", expanded: "a^2+2ab+b^2",
          col: ["a", "b"], row: ["a", "b"],
          cells: { tl: "a^2", tr: "ab", bl: "ab", br: "b^2" }
        },
        "sq-diff": {
          chip: "(a-b)^2", factored: "(a-b)^2", expanded: "a^2-2ab+b^2",
          col: ["a", "-b"], row: ["a", "-b"],
          cells: { tl: "a^2", tr: "-ab", bl: "-ab", br: "b^2" }
        },
        "diff-sq": {
          chip: "a^2-b^2", factored: "(a+b)(a-b)", expanded: "a^2-b^2",
          col: ["a", "b"], row: ["a", "-b"],
          cells: { tl: "a^2", tr: "ab", bl: "-ab", br: "-b^2" }
        }
      };
      var ORDER = ["sq-sum", "sq-diff", "diff-sq"];
      var TILE_BANK = ["a^2", "ab", "-ab", "b^2", "-b^2", "2ab", "-2ab"];
      var CELL_KEYS = ["tl", "tr", "bl", "br"];

      var TOUCH = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

      var state = {
        id: "sq-sum",
        mode: "expand",
        placed: { tl: null, tr: null, bl: null, br: null },
        revealStage: 0,
        selectedTile: null
      };

      function $(id) { return document.getElementById(id); }
      function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }
      function kx(el, tex, display) {
        clear(el);
        try { katex.render(tex, el, { throwOnError: false, displayMode: !!display }); }
        catch (e) { el.textContent = tex; }
      }
      function colorClass(v) {
        if (v.indexOf("a^2") !== -1) return "a";
        if (v.indexOf("b^2") !== -1) return "b";
        return "ab";
      }
      function paren(t) { return t.charAt(0) === "-" ? "(" + t + ")" : t; }

      var HL = "#2E7D32";
      function c(t) { return "\\textcolor{" + HL + "}{" + t + "}"; }

      function stepsFor(id, mode) {
        var S = {
          "sq-sum": {
            expand: { lhs: "(a+b)^2", rhs: ["(a+b)(a+b)", "a(a+b)+b(a+b)", "a^2+" + c("ab") + "+" + c("ab") + "+b^2", "a^2+" + c("2ab") + "+b^2"] },
            factor: { lhs: "a^2+2ab+b^2", rhs: ["a^2+" + c("ab") + "+" + c("ab") + "+b^2", "a(a+b)+b(a+b)", "(a+b)(a+b)", "(a+b)^2"] }
          },
          "sq-diff": {
            expand: { lhs: "(a-b)^2", rhs: ["(a-b)(a-b)", "a(a-b)-b(a-b)", "a^2-" + c("ab") + "-" + c("ab") + "+b^2", "a^2-" + c("2ab") + "+b^2"] },
            factor: { lhs: "a^2-2ab+b^2", rhs: ["a^2-" + c("ab") + "-" + c("ab") + "+b^2", "a(a-b)-b(a-b)", "(a-b)(a-b)", "(a-b)^2"] }
          },
          "diff-sq": {
            expand: { lhs: "(a+b)(a-b)", rhs: ["a(a-b)+b(a-b)", "a^2-" + c("ab") + "+" + c("ab") + "-b^2", "a^2-b^2"] },
            factor: { lhs: "a^2-b^2", rhs: ["a^2-" + c("ab") + "+" + c("ab") + "-b^2", "a(a-b)+b(a-b)", "(a+b)(a-b)"] }
          }
        };
        return S[id][mode === "expand" ? "expand" : "factor"];
      }

      var chipsEl = $("identity-chips");
      var cellEls = {};
      var tilesEl = $("tiles");

      // ── Identity chips ──
      function buildChips() {
        clear(chipsEl);
        ORDER.forEach(function (id) {
          var b = document.createElement("button");
          b.className = "chip" + (id === state.id ? " active" : "");
          b.type = "button";
          b.dataset.id = id;
          kx(b, IDENTITIES[id].chip);
          b.addEventListener("click", function () {
            state.id = id;
            resetBoard();
            buildChips();
            render();
          });
          chipsEl.appendChild(b);
        });
      }

      // ── Tile bank (reusable tiles) ──
      function clearTileSelection() {
        state.selectedTile = null;
        tilesEl.querySelectorAll(".tile.selected").forEach(function (t) { t.classList.remove("selected"); });
        Object.keys(cellEls).forEach(function (k) { cellEls[k].classList.remove("slot-targetable"); });
      }
      function selectTile(tileEl, val) {
        if (state.selectedTile === val && tileEl.classList.contains("selected")) {
          clearTileSelection();
          return;
        }
        clearTileSelection();
        state.selectedTile = val;
        tileEl.classList.add("selected");
        CELL_KEYS.forEach(function (k) {
          if (!state.placed[k]) cellEls[k].classList.add("slot-targetable");
        });
      }
      function buildTiles() {
        clear(tilesEl);
        TILE_BANK.forEach(function (val) {
          var t = document.createElement("span");
          t.className = "tile " + colorClass(val);
          t.dataset.val = val;
          t.tabIndex = 0;
          kx(t, val);
          t.addEventListener("click", function () { selectTile(t, val); });
          t.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectTile(t, val); }
          });
          if (!TOUCH) {
            t.draggable = true;
            t.addEventListener("dragstart", function (e) {
              e.dataTransfer.setData("text/plain", val);
              e.dataTransfer.effectAllowed = "copy";
            });
          }
          tilesEl.appendChild(t);
        });
      }

      // ── Cells ──
      function placeInCell(key, val) {
        state.placed[key] = val;
        clearTileSelection();
        renderCell(key);
        updateCheck();
      }
      function attachCell(key, el) {
        el.addEventListener("dragover", function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
          el.classList.add("drag-over");
        });
        el.addEventListener("dragleave", function () { el.classList.remove("drag-over"); });
        el.addEventListener("drop", function (e) {
          e.preventDefault();
          el.classList.remove("drag-over");
          var val = e.dataTransfer.getData("text/plain");
          if (val) placeInCell(key, val);
        });
        el.addEventListener("click", function () {
          if (state.selectedTile) placeInCell(key, state.selectedTile);
        });
      }

      function buildArea() {
        var idn = IDENTITIES[state.id];
        var rowTerm = { tl: idn.row[0], tr: idn.row[0], bl: idn.row[1], br: idn.row[1] };
        var colTerm = { tl: idn.col[0], tr: idn.col[1], bl: idn.col[0], br: idn.col[1] };
        var area = $("area-row");
        clear(area);
        cellEls = {};
        CELL_KEYS.forEach(function (key, i) {
          if (i > 0) {
            var pg = document.createElement("div");
            pg.className = "term-group";
            var sp = document.createElement("div");
            sp.className = "term-label";
            sp.innerHTML = "&nbsp;";
            var plus = document.createElement("div");
            plus.className = "plus";
            plus.textContent = "+";
            pg.appendChild(sp);
            pg.appendChild(plus);
            area.appendChild(pg);
          }
          var group = document.createElement("div");
          group.className = "term-group";
          var lab = document.createElement("div");
          lab.className = "term-label";
          kx(lab, paren(rowTerm[key]) + "\\times " + paren(colTerm[key]));
          var cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.cell = key;
          var ph = document.createElement("span");
          ph.className = "cell-placeholder";
          ph.textContent = "?";
          cell.appendChild(ph);
          group.appendChild(lab);
          group.appendChild(cell);
          area.appendChild(group);
          cellEls[key] = cell;
          attachCell(key, cell);
        });
      }

      function renderCell(key) {
        var el = cellEls[key];
        var val = state.placed[key];
        clear(el);
        el.className = "cell";
        if (val == null) {
          var ph = document.createElement("span");
          ph.className = "cell-placeholder";
          ph.textContent = "?";
          el.appendChild(ph);
          return;
        }
        el.classList.add("filled", colorClass(val));
        var span = document.createElement("span");
        span.className = "cell-val";
        kx(span, val);
        el.appendChild(span);
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cell-clear";
        btn.title = "Clear";
        btn.textContent = "\u00d7";
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          state.placed[key] = null;
          renderCell(key);
          updateCheck();
        });
        el.appendChild(btn);
      }

      // ── Check + reveal ──
      function updateCheck() {
        var idn = IDENTITIES[state.id];
        var verdict = $("verdict");
        var filled = CELL_KEYS.every(function (k) { return state.placed[k] != null; });

        if (!filled) {
          state.revealStage = 0;
          CELL_KEYS.forEach(function (k) {
            cellEls[k].classList.remove("correct", "wrong");
          });
          verdict.className = "verdict neutral";
          verdict.textContent = TOUCH
            ? "Tap a tile, then tap a cell to place it."
            : "Drag a tile into each of the four cells.";
          renderReveal();
          return;
        }

        var allOk = true;
        CELL_KEYS.forEach(function (k) {
          var ok = state.placed[k] === idn.cells[k];
          cellEls[k].classList.toggle("correct", ok);
          cellEls[k].classList.toggle("wrong", !ok);
          if (!ok) allOk = false;
        });

        if (allOk) {
          verdict.className = "verdict ok";
          verdict.textContent = "\u2713 Correct — every area matches.";
          if (state.revealStage < 1) state.revealStage = 1;
        } else {
          verdict.className = "verdict bad";
          verdict.textContent = "\u2717 Some areas are wrong — check the row \u00d7 column products.";
          state.revealStage = 0;
        }
        renderReveal();
      }

      function renderReveal() {
        var label = $("reveal-label");
        var grid = $("reveal-lines");
        var hint = $("reveal-hint");
        var btn = $("combine-btn");
        label.textContent = state.mode === "expand" ? "Expansion" : "Factorization";

        if (state.revealStage < 1) {
          clear(grid);
          hint.style.display = "";
          hint.textContent = "Fill the area model below correctly to build the steps.";
          btn.style.display = "none";
          return;
        }

        hint.style.display = "none";
        var steps = stepsFor(state.id, state.mode);
        var shown = Math.min(state.revealStage, steps.rhs.length);
        clear(grid);
        for (var i = 0; i < shown; i++) {
          var lc = document.createElement("div");
          lc.className = "step-lhs";
          if (i === 0) kx(lc, steps.lhs);
          var rc = document.createElement("div");
          rc.className = "step-rhs" + (i === shown - 1 ? " is-new" : "");
          kx(rc, "= " + steps.rhs[i]);
          grid.appendChild(lc);
          grid.appendChild(rc);
        }
        btn.textContent = "Next step →";
        btn.style.display = shown >= steps.rhs.length ? "none" : "";
      }

      // ── Render prompt / headers ──
      function render() {
        var idn = IDENTITIES[state.id];
        var lead = $("prompt-lead");
        var expr = $("prompt-expr");
        var note = $("board-note");

        if (state.mode === "expand") {
          lead.textContent = "Expand";
          kx(expr, idn.factored);
          note.textContent = "Work out each product, then place the matching tile in every cell.";
        } else {
          lead.textContent = "Factorize";
          kx(expr, idn.expanded);
          note.textContent = "Rebuild the four products that make this expression, then read off the factors.";
        }

        buildArea();

        $("bank-hint").textContent = TOUCH
          ? "Tap a tile, then tap a cell. Tiles can be reused."
          : "Drag a tile into a cell (or tap tile then cell). Tiles can be reused.";

        CELL_KEYS.forEach(renderCell);
        updateCheck();
      }

      function resetBoard() {
        state.placed = { tl: null, tr: null, bl: null, br: null };
        state.revealStage = 0;
        clearTileSelection();
      }

      // ── Events ──
      document.querySelectorAll(".mode-btn").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".mode-btn").forEach(function (x) { x.classList.remove("active"); });
          b.classList.add("active");
          state.mode = b.dataset.mode;
          resetBoard();
          render();
        });
      });
      $("combine-btn").addEventListener("click", function () {
        var steps = stepsFor(state.id, state.mode);
        if (state.revealStage < steps.rhs.length) { state.revealStage += 1; renderReveal(); }
      });
      $("reset-btn").addEventListener("click", function () {
        resetBoard();
        render();
      });

      function boot() {
        buildChips();
        buildTiles();
        render();
      }
      if (window.katex) { boot(); }
      else { (function wait() { if (window.katex) boot(); else setTimeout(wait, 30); })(); }
    })();
  </script>
</body>
</html>
