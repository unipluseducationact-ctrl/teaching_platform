<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identities Area Model — Expand &amp; Factorize</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdfbf7; --panel: #ffffff; --panel2: #f5efe6; --ink: #2c2420; --dim: #5d544f;
      --a: #0277BD; --b: #9A7209; --ab: #2E7D32;
      --a-fill: #4FC3F7; --b-fill: #FFD54F; --ab-fill: #81C784;
      --line: rgba(0, 0, 0, 0.08);
      --bad: #C62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; background: var(--bg); color: var(--ink);
      font-family: "Hanken Grotesk", system-ui, sans-serif;
    }
    header {
      padding: 16px 28px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    header h1 { font-size: 22px; margin: 0; font-weight: 700; }
    header .crumb { color: var(--dim); font-size: 13px; }
    .back {
      display: inline-flex; align-items: center; gap: 4px; padding: 7px 12px;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel);
      color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 600;
    }
    .back:hover { border-color: var(--a); color: var(--a); }
    main { padding: 18px 28px 48px; max-width: 1080px; margin: 0 auto; }

    .controls { display: flex; flex-wrap: wrap; gap: 16px 24px; align-items: center; margin-bottom: 18px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--panel); border: 1px solid var(--line); color: var(--ink);
      font: inherit; font-weight: 600; padding: 9px 15px; border-radius: 999px; cursor: pointer;
      font-size: 16px; transition: all .15s; line-height: 1.3;
    }
    .chip .katex { font-size: 1.05em; }
    .chip:hover { color: var(--a); border-color: rgba(2, 119, 189, 0.35); }
    .chip.active { color: #06283d; background: var(--a-fill); border-color: var(--a-fill); }
    .mode-toggle { display: inline-flex; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    .mode-btn { background: none; border: 0; color: var(--dim); font: inherit; font-weight: 700; padding: 9px 18px; cursor: pointer; }
    .mode-btn.active { background: var(--ab-fill); color: #06283d; }

    .lab-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(220px, 300px); gap: 20px; align-items: start; }
    @media (max-width: 820px) { .lab-layout { grid-template-columns: 1fr; } }

    .board { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; }
    .prompt { text-align: center; margin-bottom: 4px; }
    .prompt .lead { font-size: 15px; color: var(--dim); font-weight: 600; }
    .prompt .expr { font-size: 30px; margin-top: 4px; color: var(--ink); }
    .prompt .expr .katex { font-size: 1.15em; }
    .note { text-align: center; font-size: 14px; color: var(--dim); margin: 10px 0 14px; line-height: 1.5; }

    /* ── Step flow ── */
    .flow { display: flex; flex-direction: column; gap: 10px; }
    .step {
      border: 1px solid var(--line); border-left: 4px solid transparent; border-radius: 12px;
      background: #fff; padding: 12px 16px; transition: border-color .15s, background .15s;
    }
    .step.active { border-left-color: var(--ab); box-shadow: 0 2px 6px rgba(0,0,0,.06); }
    .step.locked { background: #fbfaf6; border-left-color: rgba(46,125,50,.35); }
    .step-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .step-no {
      width: 22px; height: 22px; border-radius: 999px; flex: none;
      background: var(--panel2); color: var(--dim); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step.active .step-no { background: var(--ab-fill); color: #06283d; }
    .step.locked .step-no { background: var(--ab); color: #fff; }
    .step-label { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); font-weight: 700; }
    .step-eq { display: flex; align-items: flex-end; flex-wrap: wrap; gap: 6px; }
    .step-eq .eq { font-size: 24px; color: var(--dim); font-weight: 700; align-self: center; padding-bottom: 2px; }
    .tokens { display: flex; align-items: flex-end; flex-wrap: wrap; gap: 6px; }
    .tok { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tok-cap { font-size: 12px; color: var(--dim); min-height: 15px; white-space: nowrap; }
    .tok-fix { font-size: 22px; padding-bottom: 6px; }
    .tok-fix .katex { font-size: 1.02em; }

    .slot {
      min-width: 62px; min-height: 46px; padding: 0 10px;
      border: 2px dashed rgba(0,0,0,.22); border-radius: 10px; background: #fff;
      display: flex; align-items: center; justify-content: center; position: relative;
      font-size: 20px; transition: border-color .15s, background .15s;
    }
    .slot.sign-slot { min-width: 40px; padding: 0 6px; }
    .slot.sign-slot .katex { color: #37474F; }
    .slot.sign-slot .ph { color: rgba(0,0,0,.3); font-size: 20px; }
    .slot.target { border-color: var(--a); background: rgba(79,195,247,.10); }
    .slot.drag-over { border-color: var(--a); background: rgba(79,195,247,.20); }
    .slot.correct { border-style: solid; border-color: var(--ab); background: rgba(129,199,132,.16); }
    .slot.wrong { border-style: solid; border-color: var(--bad); background: rgba(198,40,40,.08); }
    .slot .ph { color: rgba(0,0,0,.25); font-weight: 700; font-size: 22px; }
    .slot.a .katex { color: var(--a); }
    .slot.b .katex { color: var(--b); }
    .slot.ab .katex { color: var(--ab); }
    .slot-clear {
      position: absolute; top: -9px; right: -9px; width: 19px; height: 19px; border-radius: 999px;
      border: 1px solid var(--line); background: #fff; color: var(--dim); font-size: 12px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .slot-clear:hover { color: var(--bad); border-color: var(--bad); }
    .step.locked .slot { border-style: solid; border-color: var(--ab); background: rgba(129,199,132,.14); }

    .answer-line {
      margin-top: 4px; text-align: center; font-size: 24px; color: var(--ink);
      background: rgba(129,199,132,.18); border: 1px solid rgba(46,125,50,.3); border-radius: 12px;
      padding: 12px; animation: stepIn .25s ease;
    }
    .answer-line .katex { font-size: 1.05em; }
    .answer-note { text-align: center; font-size: 13px; color: var(--dim); margin-top: 6px; }
    @keyframes stepIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }

    .verdict { text-align: center; min-height: 24px; margin-top: 14px; font-size: 15px; font-weight: 700; }
    .verdict.ok { color: var(--ab); }
    .verdict.bad { color: var(--bad); }
    .verdict.neutral { color: var(--dim); font-weight: 600; font-size: 14px; }

    .btn {
      background: var(--panel); border: 1px solid var(--line); color: var(--ink); font: inherit;
      font-weight: 600; padding: 10px 20px; border-radius: 9px; cursor: pointer; font-size: 14px;
    }
    .btn:hover { border-color: var(--a); }
    .btn.primary { background: var(--ab-fill); color: #06283d; border-color: var(--ab-fill); }
    .flow-nav { display: flex; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

    .tile-bank { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; position: sticky; top: 16px; }
    .tile-bank h4 { margin: 0 0 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink); font-weight: 700; }
    .bank-hint { font-size: 12px; color: var(--dim); margin: 0 0 12px; line-height: 1.45; }
    .tiles { display: flex; flex-direction: column; gap: 6px; }
    .tiles-sub { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); font-weight: 700; margin-top: 6px; }
    .tiles-sub:first-child { margin-top: 0; }
    .tiles-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
    .tile {
      display: inline-flex; align-items: center; justify-content: center; min-width: 52px; height: 46px;
      padding: 0 14px; border-radius: 10px; font-weight: 700; font-size: 18px;
      cursor: grab; user-select: none; border: 1px solid var(--line); background: #fff;
    }
    .tile:active { cursor: grabbing; opacity: .85; }
    .tile.selected { outline: 3px solid rgba(2,119,189,.35); outline-offset: 1px; }
    .tile.a  { background: rgba(79,195,247,.22); color: var(--a); border-color: rgba(2,119,189,.4); }
    .tile.b  { background: rgba(255,213,79,.28); color: var(--b); border-color: rgba(154,114,9,.4); }
    .tile.ab { background: rgba(129,199,132,.28); color: var(--ab); border-color: rgba(46,125,50,.4); }
    .tile.grp { background: #fff; color: var(--ink); border-color: rgba(0,0,0,.18); }
    .tile.sign { min-width: 46px; background: #eef1f4; color: #37474F; border-color: rgba(0,0,0,.2); }

    .legend { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
    .legend-title { margin: 0 0 10px; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink); font-weight: 700; }
    .lg-item { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; color: var(--dim); }
    .lg-sw { width: 16px; height: 16px; border-radius: 4px; flex: none; border: 1px solid var(--line); }

    @media (max-width: 520px) {
      main { padding: 16px 16px 40px; }
      header { padding: 14px 16px; }
      .prompt .expr { font-size: 25px; }
      .step-eq .eq { font-size: 20px; }
      .slot { min-width: 54px; min-height: 42px; font-size: 18px; }
      .tile { min-width: 46px; height: 42px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="../levels/pre-s3.html">← Platform</a>
    <h1>Identities · Area Model</h1>
    <span class="crumb">Perfect squares &amp; difference of two squares · expand and factorize</span>
  </header>

  <main>
    <div class="controls">
      <div class="chip-row" id="identity-chips"></div>
      <div class="mode-toggle" role="group" aria-label="Direction">
        <button class="mode-btn active" data-mode="expand" type="button">Expand</button>
        <button class="mode-btn" data-mode="factorize" type="button">Factorize</button>
      </div>
    </div>

    <div class="lab-layout">
      <div class="board">
        <div class="prompt">
          <div class="lead" id="prompt-lead"></div>
          <div class="expr" id="prompt-expr"></div>
        </div>

        <p class="note" id="board-note"></p>

        <div class="flow" id="flow"></div>

        <div class="verdict neutral" id="verdict"></div>

        <div class="flow-nav">
          <button class="btn primary" id="next-btn" type="button">Next step →</button>
          <button class="btn" id="reset-btn" type="button">Clear board</button>
        </div>
      </div>

      <aside class="tile-bank">
        <h4>Term tiles</h4>
        <p class="bank-hint" id="bank-hint"></p>
        <div class="tiles" id="tiles"></div>
        <div class="legend">
          <p class="legend-title">Colour key</p>
          <div class="lg-item"><span class="lg-sw" style="background:var(--a-fill)"></span> a² — square of a</div>
          <div class="lg-item"><span class="lg-sw" style="background:var(--ab-fill)"></span> ab — rectangle / middle term</div>
          <div class="lg-item"><span class="lg-sw" style="background:var(--b-fill)"></span> b² — square of b</div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      var IDENTITIES = {
        "sq-sum": { chip: "(a+b)^2", row: ["a", "b"], col: ["a", "b"], cells: { tl: "a^2", tr: "ab", bl: "ab", br: "b^2" } },
        "sq-diff": { chip: "(a-b)^2", row: ["a", "-b"], col: ["a", "-b"], cells: { tl: "a^2", tr: "-ab", bl: "-ab", br: "b^2" } },
        "diff-sq": { chip: "a^2-b^2", row: ["a", "-b"], col: ["a", "b"], cells: { tl: "a^2", tr: "ab", bl: "-ab", br: "-b^2" } }
      };
      var ORDER = ["sq-sum", "sq-diff", "diff-sq"];
      var CELL_KEYS = ["tl", "tr", "bl", "br"];

      var TOUCH = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

      var state = {
        id: "sq-sum",
        mode: "expand",
        def: null,
        slotAns: {},
        stepIndex: 0,
        placed: {},
        selectedTile: null
      };

      function $(id) { return document.getElementById(id); }
      function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }
      function kx(el, tex) {
        clear(el);
        try { katex.render(tex, el, { throwOnError: false }); }
        catch (e) { el.textContent = tex; }
      }
      function paren(t) { return t.charAt(0) === "-" ? "(" + t + ")" : t; }
      function colorClass(v) {
        if (v.indexOf("(") !== -1) return "grp";
        if (v === "a" || v.indexOf("a^2") !== -1) return "a";
        if (v === "b" || v === "-b" || v.indexOf("b^2") !== -1) return "b";
        return "ab";
      }

      // token helpers
      function F(t) { return { fix: t }; }
      function S(id, ans, cap) { return { slot: true, id: id, ans: ans, cap: cap }; }
      function SGN(id, sign) { return { slot: true, sign: true, id: id, ans: sign }; }
      function stripSign(v) { return v.charAt(0) === "-" ? v.slice(1) : v; }
      function signOf(v) { return v.charAt(0) === "-" ? "-" : "+"; }
      function valKind(v) { return (v === "+" || v === "-") ? "sign" : "term"; }

      // the four-products (area model) line, built from the identity.
      // Every term (except the first) is preceded by its own draggable sign slot.
      function areasLine(idn) {
        var rowTerm = { tl: idn.row[0], tr: idn.row[0], bl: idn.row[1], br: idn.row[1] };
        var colTerm = { tl: idn.col[0], tr: idn.col[1], bl: idn.col[0], br: idn.col[1] };
        var toks = [];
        CELL_KEYS.forEach(function (k, i) {
          var raw = idn.cells[k];
          if (i > 0) toks.push(SGN("s_" + k, signOf(raw)));
          toks.push(S(k, stripSign(raw), paren(rowTerm[k]) + "\\cdot " + paren(colTerm[k])));
        });
        return toks;
      }

      function DEF(id, mode) {
        var idn = IDENTITIES[id];
        var A = areasLine(idn);
        var AREA = "Fill the four areas (row × column)";
        if (mode === "expand") {
          if (id === "sq-sum") return {
            lhs: "(a+b)^2",
            steps: [
              { label: "Write as a product", tokens: [S("p1", "(a+b)"), S("p2", "(a+b)")] },
              { label: "Expand each bracket", tokens: [S("g1a", "a"), S("g1b", "(a+b)"), SGN("sg", "+"), S("g2a", "b"), S("g2b", "(a+b)")] },
              { label: AREA, tokens: A },
              { label: "Combine like terms", tokens: [F("a^2"), SGN("sm1", "+"), S("m", "2ab"), SGN("sm2", "+"), F("b^2")] }
            ]
          };
          if (id === "sq-diff") return {
            lhs: "(a-b)^2",
            steps: [
              { label: "Write as a product", tokens: [S("p1", "(a-b)"), S("p2", "(a-b)")] },
              { label: "Expand each bracket", tokens: [S("g1a", "a"), S("g1b", "(a-b)"), SGN("sg", "-"), S("g2a", "b"), S("g2b", "(a-b)")] },
              { label: AREA, tokens: A },
              { label: "Combine like terms", tokens: [F("a^2"), SGN("sm1", "-"), S("m", "2ab"), SGN("sm2", "+"), F("b^2")] }
            ]
          };
          return {
            lhs: "(a+b)(a-b)",
            steps: [
              { label: "Expand each bracket", tokens: [S("g1a", "a"), S("g1b", "(a-b)"), SGN("sg", "+"), S("g2a", "b"), S("g2b", "(a-b)")] },
              { label: AREA, tokens: A }
            ],
            answer: "a^2-b^2",
            note: "The +ab and −ab areas cancel out."
          };
        }
        // factorize
        if (id === "sq-sum") return {
          lhs: "a^2+2ab+b^2",
          steps: [
            { label: "Split into four areas (row × column)", tokens: A },
            { label: "Group in pairs", tokens: [S("g1a", "a"), S("g1b", "(a+b)"), SGN("sg", "+"), S("g2a", "b"), S("g2b", "(a+b)")] },
            { label: "Take out the common factor", tokens: [S("f1", "(a+b)"), S("f2", "(a+b)")] }
          ],
          answer: "(a+b)^2"
        };
        if (id === "sq-diff") return {
          lhs: "a^2-2ab+b^2",
          steps: [
            { label: "Split into four areas (row × column)", tokens: A },
            { label: "Group in pairs", tokens: [S("g1a", "a"), S("g1b", "(a-b)"), SGN("sg", "-"), S("g2a", "b"), S("g2b", "(a-b)")] },
            { label: "Take out the common factor", tokens: [S("f1", "(a-b)"), S("f2", "(a-b)")] }
          ],
          answer: "(a-b)^2"
        };
        return {
          lhs: "a^2-b^2",
          steps: [
            { label: "Split into four areas (row × column)", tokens: A },
            { label: "Group in pairs", tokens: [S("g1a", "a"), S("g1b", "(a+b)"), SGN("sg", "-"), S("g2a", "b"), S("g2b", "(a+b)")] },
            { label: "Take out the common factor", tokens: [S("f1", "(a+b)"), S("f2", "(a-b)")] }
          ]
        };
      }

      var chipsEl = $("identity-chips");
      var tilesEl = $("tiles");
      var flowEl = $("flow");

      // ── Identity chips ──
      function buildChips() {
        clear(chipsEl);
        ORDER.forEach(function (id) {
          var b = document.createElement("button");
          b.className = "chip" + (id === state.id ? " active" : "");
          b.type = "button";
          kx(b, IDENTITIES[id].chip);
          b.addEventListener("click", function () {
            state.id = id;
            buildChips();
            setupDef();
          });
          chipsEl.appendChild(b);
        });
      }

      // ── Tile bank ──
      function bankTerms() {
        var out = [], seen = {};
        state.def.steps.forEach(function (st) {
          st.tokens.forEach(function (tk) {
            if (tk.slot && !tk.sign && !seen[tk.ans]) { seen[tk.ans] = 1; out.push(tk.ans); }
          });
        });
        // Always offer both brackets as options (distractors) so the answer
        // can't be guessed just from what's available.
        ["(a+b)", "(a-b)"].forEach(function (v) {
          if (!seen[v]) { seen[v] = 1; out.push(v); }
        });
        return out;
      }
      function clearTileSelection() {
        state.selectedTile = null;
        tilesEl.querySelectorAll(".tile.selected").forEach(function (t) { t.classList.remove("selected"); });
      }
      function selectTile(tileEl, val) {
        var was = state.selectedTile === val && tileEl.classList.contains("selected");
        clearTileSelection();
        if (!was) { state.selectedTile = val; tileEl.classList.add("selected"); }
        renderFlow();
      }
      function makeTile(val, extraClass) {
        var t = document.createElement("span");
        t.className = "tile " + extraClass;
        t.tabIndex = 0;
        kx(t, val);
        t.addEventListener("click", function () { selectTile(t, val); });
        t.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectTile(t, val); }
        });
        if (!TOUCH) {
          t.draggable = true;
          t.addEventListener("dragstart", function (e) {
            e.dataTransfer.setData("text/plain", val);
            e.dataTransfer.effectAllowed = "copy";
          });
        }
        return t;
      }
      function buildTiles() {
        clear(tilesEl);

        var signLabel = document.createElement("div");
        signLabel.className = "tiles-sub";
        signLabel.textContent = "Signs";
        tilesEl.appendChild(signLabel);
        var signRow = document.createElement("div");
        signRow.className = "tiles-row";
        ["+", "-"].forEach(function (s) { signRow.appendChild(makeTile(s, "sign")); });
        tilesEl.appendChild(signRow);

        var termLabel = document.createElement("div");
        termLabel.className = "tiles-sub";
        termLabel.textContent = "Terms";
        tilesEl.appendChild(termLabel);
        var termRow = document.createElement("div");
        termRow.className = "tiles-row";
        bankTerms().forEach(function (val) { termRow.appendChild(makeTile(val, colorClass(val))); });
        tilesEl.appendChild(termRow);
      }

      // ── Step / slot rendering ──
      function place(slotId, val) {
        state.placed[slotId] = val;
        clearTileSelection();
        afterChange();
      }
      function removeSlot(slotId) {
        delete state.placed[slotId];
        afterChange();
      }
      function afterChange() {
        renderFlow();
        updateVerdict();
        updateNav();
      }

      function stepSatisfied(i) {
        var ok = true;
        state.def.steps[i].tokens.forEach(function (tk) {
          if (tk.slot && state.placed[tk.id] !== tk.ans) ok = false;
        });
        return ok;
      }
      function stepHasWrong(i) {
        var bad = false;
        state.def.steps[i].tokens.forEach(function (tk) {
          if (tk.slot && state.placed[tk.id] != null && state.placed[tk.id] !== tk.ans) bad = true;
        });
        return bad;
      }

      function renderSlot(tok, active) {
        var slotKind = tok.sign ? "sign" : "term";
        var slot = document.createElement("div");
        slot.className = "slot " + (tok.sign ? "sign-slot" : colorClass(tok.ans));
        var val = state.placed[tok.id];
        if (val == null) {
          var ph = document.createElement("span");
          ph.className = "ph";
          ph.textContent = tok.sign ? "\u00b1" : "?";
          slot.appendChild(ph);
          if (active) {
            if (state.selectedTile && valKind(state.selectedTile) === slotKind) slot.classList.add("target");
            slot.addEventListener("click", function () {
              if (state.selectedTile && valKind(state.selectedTile) === slotKind) place(tok.id, state.selectedTile);
            });
            slot.addEventListener("dragover", function (e) {
              e.preventDefault(); e.dataTransfer.dropEffect = "copy"; slot.classList.add("drag-over");
            });
            slot.addEventListener("dragleave", function () { slot.classList.remove("drag-over"); });
            slot.addEventListener("drop", function (e) {
              e.preventDefault(); slot.classList.remove("drag-over");
              var v = e.dataTransfer.getData("text/plain");
              if (v && valKind(v) === slotKind) place(tok.id, v);
            });
          }
        } else {
          var v = document.createElement("span");
          kx(v, val);
          slot.appendChild(v);
          slot.classList.add(val === tok.ans ? "correct" : "wrong");
          if (active) {
            var x = document.createElement("button");
            x.type = "button"; x.className = "slot-clear"; x.textContent = "\u00d7"; x.title = "Clear";
            x.addEventListener("click", function (e) { e.stopPropagation(); removeSlot(tok.id); });
            slot.appendChild(x);
          }
        }
        return slot;
      }

      function renderStep(step, i) {
        var active = i === state.stepIndex;
        var wrap = document.createElement("div");
        wrap.className = "step " + (active ? "active" : "locked");

        var head = document.createElement("div");
        head.className = "step-head";
        var no = document.createElement("span");
        no.className = "step-no";
        no.textContent = i + 1;
        var lab = document.createElement("span");
        lab.className = "step-label";
        lab.textContent = step.label;
        head.appendChild(no); head.appendChild(lab);
        wrap.appendChild(head);

        var eq = document.createElement("div");
        eq.className = "step-eq";
        var eqs = document.createElement("span");
        eqs.className = "eq";
        eqs.textContent = "=";
        eq.appendChild(eqs);

        var tokensWrap = document.createElement("div");
        tokensWrap.className = "tokens";
        var hasCap = step.tokens.some(function (tk) { return tk.slot && tk.cap; });
        step.tokens.forEach(function (tk) {
          var tokEl = document.createElement("div");
          tokEl.className = "tok";
          if (hasCap) {
            var cap = document.createElement("div");
            cap.className = "tok-cap";
            if (tk.slot && tk.cap) kx(cap, tk.cap); else cap.innerHTML = "&nbsp;";
            tokEl.appendChild(cap);
          }
          if (tk.slot) {
            tokEl.appendChild(renderSlot(tk, active));
          } else {
            var fx = document.createElement("div");
            fx.className = "tok-fix";
            kx(fx, tk.fix);
            tokEl.appendChild(fx);
          }
          tokensWrap.appendChild(tokEl);
        });
        eq.appendChild(tokensWrap);
        wrap.appendChild(eq);
        return wrap;
      }

      function renderFlow() {
        clear(flowEl);
        var N = state.def.steps.length;
        var upto = Math.min(state.stepIndex, N - 1);
        for (var i = 0; i <= upto; i++) {
          flowEl.appendChild(renderStep(state.def.steps[i], i));
        }
        if (state.stepIndex >= N && state.def.answer) {
          var ans = document.createElement("div");
          ans.className = "answer-line";
          kx(ans, "= " + state.def.answer);
          flowEl.appendChild(ans);
          if (state.def.note) {
            var nt = document.createElement("div");
            nt.className = "answer-note";
            nt.textContent = state.def.note;
            flowEl.appendChild(nt);
          }
        }
      }

      function updateVerdict() {
        var v = $("verdict");
        var N = state.def.steps.length;
        if (state.stepIndex >= N) {
          v.className = "verdict ok";
          v.textContent = "\u2713 Complete — every step matches.";
          return;
        }
        if (stepHasWrong(state.stepIndex)) {
          v.className = "verdict bad";
          v.textContent = "\u2717 Check the red slots — they don't match.";
        } else if (stepSatisfied(state.stepIndex)) {
          v.className = "verdict ok";
          v.textContent = "\u2713 Step correct — press Next step \u2192";
        } else {
          v.className = "verdict neutral";
          v.textContent = TOUCH
            ? "Tap a tile, then tap a slot to fill it."
            : "Drag a tile into each slot (or tap tile then slot).";
        }
      }

      function updateNav() {
        var N = state.def.steps.length;
        var btn = $("next-btn");
        var showNext = state.stepIndex < N && stepSatisfied(state.stepIndex);
        btn.style.display = showNext ? "" : "none";
        btn.textContent = state.stepIndex + 1 >= N ? "Finish \u2713" : "Next step \u2192";
      }

      // ── Prompt / setup ──
      function setupDef() {
        state.def = DEF(state.id, state.mode);
        state.slotAns = {};
        state.def.steps.forEach(function (st) {
          st.tokens.forEach(function (tk) { if (tk.slot) state.slotAns[tk.id] = tk.ans; });
        });
        state.stepIndex = 0;
        state.placed = {};
        state.selectedTile = null;

        var lead = $("prompt-lead");
        var expr = $("prompt-expr");
        lead.textContent = state.mode === "expand" ? "Expand" : "Factorize";
        kx(expr, state.def.lhs);
        $("board-note").textContent = state.mode === "expand"
          ? "Build every line of the expansion by dragging tiles into the slots, one step at a time."
          : "Build every line of the factorization by dragging tiles into the slots, one step at a time.";
        $("bank-hint").textContent = TOUCH
          ? "Tap a tile, then tap a slot. Tiles can be reused."
          : "Drag a tile into a slot (or tap tile then slot). Tiles can be reused.";

        buildTiles();
        renderFlow();
        updateVerdict();
        updateNav();
      }

      // ── Events ──
      document.querySelectorAll(".mode-btn").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".mode-btn").forEach(function (x) { x.classList.remove("active"); });
          b.classList.add("active");
          state.mode = b.dataset.mode;
          setupDef();
        });
      });
      $("next-btn").addEventListener("click", function () {
        var N = state.def.steps.length;
        if (state.stepIndex < N && stepSatisfied(state.stepIndex)) {
          state.stepIndex += 1;
          clearTileSelection();
          afterChange();
        }
      });
      $("reset-btn").addEventListener("click", function () {
        state.stepIndex = 0;
        state.placed = {};
        clearTileSelection();
        afterChange();
      });

      function boot() {
        buildChips();
        setupDef();
      }
      if (window.katex) { boot(); }
      else { (function wait() { if (window.katex) boot(); else setTimeout(wait, 30); })(); }
    })();
  </script>
</body>
</html>
